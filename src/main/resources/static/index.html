<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="app-container">

<!-- Sidebar -->
<nav class="sidebar">
    <header>
        <div class="sidebar-logo">
            UMONS<span>Calc</span>
        </div>
    </header>
    <body>
        <button class="nav-item active" onclick="showPage('calculator', this)">
            <span class="nav-icon">🧮</span>
            <span class="nav-text" data-i18n="calculator"></span>
        </button>
        <button class="nav-item" onclick="showPage('scientific', this)">
            <span class="nav-icon">🔬</span>
            <span class="nav-text" data-i18n="scientific"></span>
        </button>
        <button class="nav-item" onclick="showPage('equations', this)">
            <span class="nav-icon">📐</span>
            <span class="nav-text" data-i18n="equations"></span>
        </button>
        <button class="nav-item" onclick="showPage('programmer', this)">
            <span class="nav-icon">💻</span>
            <span class="nav-text" data-i18n="programmer"></span>
        </button>
        <button class="nav-item" onclick="showPage('converter', this)">
            <span class="nav-icon">⚖️</span>
            <span class="nav-text" data-i18n="unit_converter"></span>
        </button>
        <button class="nav-item" onclick="showPage('currency', this)">
            <span class="nav-icon">💱</span>
            <span class="nav-text" data-i18n="currency_converter"></span>
        </button>
        <button class="nav-item" onclick="showPage('help', this)">
            <span class="nav-icon">ℹ️</span>
            <span class="nav-text" data-i18n="help"></span>
        </button>
    </body>
    <footer>
        <button id="night-mode-toggle" onclick="toggleNightMode()">
        <span id="night-mode-icon">🌙</span>
        </button>
        <button id="lang-toggle">
            <span id="translate-icon" value="en">🌐</span>
        </button>
    </footer>
</nav>

<!-- Main content -->
<main class="main">

    <!-- Calculator Page -->
    <div id="page-calculator" class="page active">
        <div class="page-header">
            <div class="page-title" data-i18n="calculator"></div>
            <div class="page-subtitle" data-i18n="calculator_subtitle"></div>
        </div>

        <!-- Display Screen -->
        <div class="card">
            <div id="std_display" class="display">
                <div id="std_expression" class="expression" aria-live="polite"></div>
                <div id="std_result" class="result" aria-live="polite">0</div>
            </div>

            <!-- Standard calculator buttons -->
            <div class="grid">
                <row>
                    <button class="light" onclick="app.clearDisplay()">C</button>
                    <button class="light" onclick="app.changeSign()">+/-</button>
                    <button class="light" onclick="app.percentage()">%</button>
                    <button class="op" value="÷" >÷</button>
                </row>
                <row>
                    <button class="digit" value="7" >7</button>
                    <button class="digit" value="8" >8</button>
                    <button class="digit" value="9" >9</button>
                    <button class="op" value="×" >×</button>
                </row>
                <row>
                    <button class="digit" value="4" >4</button>
                    <button class="digit" value="5" >5</button>
                    <button class="digit" value="6" >6</button>
                    <button class="op" value="-" >−</button>
                </row>
                <row>
                    <button class="digit" value="1" >1</button>
                    <button class="digit" value="2" >2</button>
                    <button class="digit" value="3" >3</button>
                    <button class="op" value="+" >+</button>
                </row>
                <row>
                    <button class="digit" value="0" style="grid-column: span 2" >0</button>
                    <button class="digit" value="." >.</button>
                    <button class="op" onclick="app.calculate()">=</button>
                </row>
            </div>

            <div id="std_error" class="error" role="alert"></div>

            <div class="history-section">
                <div class="history-title" data-i18n="history"></div>
                <ul id="std_history" class="history"></ul>
            </div>
        </div>
    </div>

    <!-- Scientific Calculator Page -->
    <div id="page-scientific" class="page">
        <div class="page-header">
            <div class="page-title" data-i18n="scientific"></div>
            <div class="page-subtitle" data-i18n="scientific_subtitle"></div>
        </div>

        <div class="card">

            <!-- Display Screen -->
            <div id="sct_display" class="display">
                <div id="sct_expression" class="expression" aria-live="polite"></div>
                <div id="sct_result" class="result" aria-live="polite">0</div>
            </div>

            <!-- Scientific calculator buttons -->
            <div class="grid sct">
                <row>
                    <button class="sct" value="mod">mod</button>
                    <button class="sct" style="font-family: 'Cascadia Code';" value="i">i</button>
                    <button class="light" onclick="app.changeSign()">+/-</button>
                    <button class="light" onclick="app.deleteLastEntry()">⌫</button>
                </row>
                <row>
                    <button class="sct" value="^">xʸ</button>
                    <button class="sct" value="^2">x²</button>
                    <button class="sct" value="sqrt">√</button>
                    <button class="light" onclick="app.clearDisplay()">C</button>
                </row>
                <row>
                    <button class="sct" value="!">x<span style="font-style: normal;">!</span></button>
                    <button class="sct" value="(">(</button>
                    <button id="close-paren" class="sct" value=")" disabled>)</button>
                    <button class="op" value="÷">÷</button>
                </row>
                <row>
                    <button class="digit" value="7">7</button>
                    <button class="digit" value="8">8</button>
                    <button class="digit" value="9">9</button>
                    <button class="op" value="×">×</button>
                </row>
                <row>
                    <button class="digit" value="4">4</button>
                    <button class="digit" value="5">5</button>
                    <button class="digit" value="6">6</button>
                    <button class="op" value="-">−</button>
                </row>
                <row>
                    <button class="digit" value="1">1</button>
                    <button class="digit" value="2">2</button>
                    <button class="digit" value="3">3</button>
                    <button class="op" value="+">+</button>
                </row>
                <row>
                    <button id="ans_button" class="light" onclick="app.getLastAnswer()" disabled >Ans</button>
                    <button class="digit" value="0">0</button>
                    <button class="op" value=".">.</button>
                    <button class="op" onclick="app.calculate()">=</button>
                </row>
            </div>

            <div id="sct_error" class="error" role="alert"></div>

            <div class="history-section">
                <div class="history-title" data-i18n="history"></div>
                <ul id="sct_history" class="history"></ul>
            </div>
        </div>
            
    </div>
    
    <!-- Linear Equations Page -->
    <div id="page-equations" class="page">
        <div class="page-header">
            <div class="page-title" data-i18n="equations"></div>
            <div class="page-subtitle" data-i18n="equations_subtitle"></div>
        </div>

        <div class="card">
            <div class="card-title" data-i18n="single_equation"></div>
            <p class="hint" data-i18n="equation_example"></p>
            <div class="input-row">
                <input type="text" id="equation" placeholder="e.g. 2x + 3 = 7" data-i18n-placeholder="input.single_equation_placeholder"/>
                <button class="btn btn-secondary" onclick="solveEquation()" data-i18n="solve"></button>
            </div>
            <div id="result-single" class="eq-result"></div>
        </div>

        <div class="card">
            <div class="card-title" data-i18n="system_of_equations"></div>
            <p class="hint" data-i18n="system_example"></p>
            <div class="input-row">
                <input type="text" id="eq1" placeholder="First equation: e.g. 2x + y = 5" data-i18n-placeholder="input.first_equation_placeholder"/>
                <input type="text" id="eq2" placeholder="Second equation: e.g. x - y = 1" data-i18n-placeholder="input.second_equation_placeholder"/>
            </div>
            <button class="btn btn-secondary btn-full" onclick="solveSystem()" data-i18n="solve_system"></button>
            <div id="result-system" class="eq-result"></div>
        </div>
    </div>

    <!-- Unit Converter Page -->
    <div id="page-converter" class="page">
        <div class="page-header">
            <div class="page-title" data-i18n="unit_converter"></div>
            <div class="page-subtitle" data-i18n="unit_converter_subtitle"></div>
        </div>

        <div class="card">
            <div class="card-title" data-i18n="category"></div>
            <div class="category-tabs">
                <button class="cat-tab active" onclick="selectCategory('length', this)" data-i18n="category.length"></button>
                <button class="cat-tab" onclick="selectCategory('weight', this)" data-i18n="category.weight"></button>
                <button class="cat-tab" onclick="selectCategory('temperature', this)" data-i18n="category.temperature"></button>
                <button class="cat-tab" onclick="selectCategory('area', this)" data-i18n="category.area"></button>
                <button class="cat-tab" onclick="selectCategory('volume', this)" data-i18n="category.volume"></button>
                <button class="cat-tab" onclick="selectCategory('speed', this)" data-i18n="category.speed"></button>
            </div>

            <div class="converter-grid">
                <div>
                    <div class="converter-label" data-i18n="from"></div>
                    <input type="text" id="converter-value" placeholder="Enter value" data-i18n-placeholder="input.enter_value"/>
                    <select id="from-unit"></select>
                </div>

                <button class="switch-btn" onclick="switchUnits()">⇄</button>

                <div>
                    <div class="converter-label" data-i18n="to"></div>
                    <input readonly type="text" id="converter-result"/>
                    <select id="to-unit"></select>
                </div>
            </div>

            <button class="btn btn-primary btn-full" onclick="convertUnits()" data-i18n="convert"></button>
            <div id="converter-error" class="eq-result" style="margin-top:0.8rem"></div>
        </div>
    </div>

    <!-- Programmer Calculator Page -->
    <div id="page-programmer" class="page">
        Programmer Calculator coming soon!
    </div>

    <!-- Currency Converter Page -->
    <div id="page-currency" class="page">
        Currency Converter coming soon!
    </div>

    <!-- Help Page -->
    <div id="page-help" class="page">
        <div class="page-header">
            <div class="page-title" data-i18n="help_subtitle"></div>
        </div>

        <div class="card">
            <div class="accordion open">
                <button type="button" class="accordion-toggle" aria-expanded="true">
                    <span data-i18n="standard_calculator"></span>
                    <span class="accordion-icon" aria-hidden="true"></span>
                </button>
                <ul class="accordion-panel">
                    <li data-i18n="standard_calculator_help_1"></li>
                    <li data-i18n="standard_calculator_help_2"></li>
                    <li data-i18n="standard_calculator_help_3"></li>
                </ul>
            </div>
            <div class="accordion">
                <button type="button" class="accordion-toggle" aria-expanded="false">
                    <span data-i18n="scientific_calculator"></span>
                    <span class="accordion-icon" aria-hidden="true"></span>
                </button>
                <ul class="accordion-panel">
                    <li data-i18n="scientific_calculator_help_1"></li>
                    <li data-i18n="scientific_calculator_help_2"></li>
                    <li data-i18n="scientific_calculator_help_3"></li>
                </ul>
            </div>
            <div class="accordion">
                <button type="button" class="accordion-toggle" aria-expanded="false">
                    <span data-i18n="equations"></span>
                    <span class="accordion-icon" aria-hidden="true"></span>
                </button>
                <ul class="accordion-panel">
                    <li data-i18n="equations_help_1"></li>
                    <li data-i18n="equations_help_2"></li>
                </ul>
            </div>
            <div class="accordion">
                <button type="button" class="accordion-toggle" aria-expanded="false">
                    <span data-i18n="unit_converter"></span>
                    <span class="accordion-icon" aria-hidden="true"></span>
                </button>
                <ul class="accordion-panel">
                    <li data-i18n="unit_converter_help_1"></li>
                    <li data-i18n="unit_converter_help_2"></li>
                </ul>
            </div>
            <div class="accordion">
                <button type="button" class="accordion-toggle" aria-expanded="false">
                    <span data-i18n="currency_converter"></span>
                    <span class="accordion-icon" aria-hidden="true"></span>
                </button>
                <ul class="accordion-panel">
                    <li data-i18n="currency_converter_help_1"></li>
                    <li data-i18n="currency_converter_help_2"></li>
                </ul>
            </div>
            <div class="accordion">
                <button type="button" class="accordion-toggle" aria-expanded="false">
                    <span data-i18n="programmer"></span>
                    <span class="accordion-icon" aria-hidden="true"></span>
                </button>
                <ul class="accordion-panel">
                    <li data-i18n="programmer_help_1"></li>
                    <li data-i18n="programmer_help_2"></li>
                </ul>
            </div>


        </div>
    </div>

</main>

<!-- JavaScript files -->
<script src="js/app.js"></script>
<script src="js/equations.js"></script>
<script src="js/converter.js"></script>
<script src="js/main.js"></script>
<script src="js/i18n.js"></script>
<script>
    initI18n();
</script>
</div>
</body>
</html>
