<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="calculator">
    <h1>Calculator</h1>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab active" onclick="showTab('calculator', event)">Calculator</button>
        <button class="tab" onclick="showTab('equations', event)">Linear Equations</button>
        <button class="tab" onclick="showTab('converter', event)">Unit Converter</button>

    </div>


    <!-- Calculator Tab -->
    <div id="tab-calculator">
        <!-- Display -->
        <div class="display">
            <div id="expression" class="expression" aria-live="polite"></div>
            <div id="result" class="result" aria-live="polite">0</div>
        </div>

        <!-- Number input area -->
        <div class="input-row">
            <input
                    type="number"
                    id="numberInput"
                    placeholder="Enter a number"
                    aria-label="Number input"
            />
            <button class="btn btn-secondary" onclick="app.addNumber()" aria-label="Add number to expression">
                Add
            </button>
        </div>

        <!-- Operation buttons -->
        <div class="operations" role="group" aria-label="Operations">
            <button class="btn btn-op" onclick="app.setOperation('plus')"    aria-label="Addition">+</button>
            <button class="btn btn-op" onclick="app.setOperation('minus')"   aria-label="Subtraction">−</button>
            <button class="btn btn-op" onclick="app.setOperation('times')"   aria-label="Multiplication">×</button>
            <button class="btn btn-op" onclick="app.setOperation('divides')" aria-label="Division">÷</button>
        </div>

        <!-- Action buttons -->
        <div class="actions">
            <button class="btn btn-primary" onclick="app.calculate()" aria-label="Calculate result">=</button>
            <button class="btn btn-danger"  onclick="app.clear()"     aria-label="Clear">C</button>
        </div>

        <!-- Error message -->
        <div id="error" class="error" role="alert" aria-live="assertive"></div>

        <!-- History -->
        <div class="history-section">
            <h2>History</h2>
            <ul id="history" class="history" aria-label="Calculation history"></ul>
        </div>
    </div>

    <!-- Linear Equations Tab -->
    <div id="tab-equations" style="display:none">

        <!-- Single Equation -->
        <div class="equation-section">
            <h2>Single Equation</h2>
            <p class="hint">Example: <code>2x + 3 = 7</code></p>
            <div class="input-row">
                <input type="text" id="equation" placeholder="e.g. 2x + 3 = 7" />
                <button class="btn btn-secondary" onclick="solveEquation()">Solve</button>
            </div>
            <div id="result-single" class="eq-result"></div>
        </div>

        <!-- System of Equations -->
        <div class="equation-section">
            <h2>System of Two Equations</h2>
            <p class="hint">Example: <code>2x + y = 5</code> and <code>x - y = 1</code></p>
            <input type="text" id="eq1" placeholder="e.g. 2x + y = 5" />
            <input type="text" id="eq2" placeholder="e.g. x - y = 1" />
            <button class="btn btn-secondary" onclick="solveSystem()">Solve System</button>
            <div id="result-system" class="eq-result"></div>
        </div>

    </div>

    <!-- Unit Converter Tab -->
    <div id="tab-converter" style="display:none">

        <div class="equation-section">
            <h2>Unit Converter</h2>

            <!-- Category selector -->
            <p class="hint">Select a category :</p>
            <select id="category" onchange="updateUnits()" class="converter-select">
                <option value="length">Length</option>
                <option value="weight">Weight</option>
                <option value="temperature">Temperature</option>
            </select>

            <!-- From -->
            <p class="hint">From :</p>
            <div class="input-row">
                <input type="number" id="converter-value" placeholder="Enter value" />
                <select id="from-unit" class="converter-select">
                </select>
            </div>

            <!-- Switch button -->
            <button class="btn btn-secondary" onclick="switchUnits()" style="width:100%; margin: 0.5rem 0">
                ⇅ Switch
            </button>

            <!-- To -->
            <p class="hint">To :</p>
            <div class="input-row">
                <input type="number" id="converter-result" placeholder="Result" readonly />
                <select id="to-unit" class="converter-select">
                </select>
            </div>

            <button class="btn btn-secondary" onclick="convertUnits()" style="width:100%; margin-top: 0.5rem">
                Convert
            </button>

            <div id="converter-error" class="eq-result" style="margin-top:0.5rem"></div>
        </div>

    </div>

</div>

<script src="js/app.js"></script>
<script src="js/equations.js"></script>
<script src="js/converter.js"></script>
</body>
</html>
