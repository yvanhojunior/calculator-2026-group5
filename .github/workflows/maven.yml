# Build and test a Java project with Maven, and compute and report test coverage 

name: Java CI with Maven

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

permissions:
  contents: read

jobs:
  build:
    name: building, testing and quality analysis
    runs-on: ubuntu-latest
    env:
      ALWAYSDATA_POST_DEPLOY_CMD: ${{ secrets.ALWAYSDATA_POST_DEPLOY_CMD }}

    permissions:
      # need write permissions for publishing the test report
      checks: write
      contents: write

    steps:
    - id: checkout
      name: checkout repository
      uses: actions/checkout@v6
      
    - id: setupjava
      name: Set up with Java 25
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: 25
        cache: 'maven'
        
    - id: mvn
      name: Build with Maven (including running all tests)
      run: mvn -B verify --file pom.xml

    - id: sshpreflight
      name: Validate deploy SSH secrets (non-empty)
      if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/develop' }}
      env:
        SSH_HOST: ${{ secrets.ALWAYSDATA_SSH_HOST }}
        SSH_USER: ${{ secrets.ALWAYSDATA_SSH_USER }}
        SSH_KEY: ${{ secrets.ALWAYSDATA_SSH_KEY }}
        SSH_PASSWORD: ${{ secrets.ALWAYSDATA_SSH_PASSWORD }}
        DEPLOY_PATH: ${{ secrets.ALWAYSDATA_DEPLOY_PATH }}
      run: |
        set -euo pipefail
        [ -n "${SSH_HOST}" ] || { echo "Missing secret: ALWAYSDATA_SSH_HOST"; exit 1; }
        [ -n "${SSH_USER}" ] || { echo "Missing secret: ALWAYSDATA_SSH_USER"; exit 1; }
        [ -n "${DEPLOY_PATH}" ] || { echo "Missing secret: ALWAYSDATA_DEPLOY_PATH"; exit 1; }
        if [ -z "${SSH_KEY}" ] && [ -z "${SSH_PASSWORD}" ]; then
          echo "Missing auth secret: set ALWAYSDATA_SSH_KEY or ALWAYSDATA_SSH_PASSWORD"
          exit 1
        fi
        echo "SSH deploy secrets are present"

    - id: deploy
      name: Deploy JAR to alwaysdata (develop only)
      if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/develop' }}
      uses: appleboy/scp-action@v1.0.0
      with:
        host: ${{ secrets.ALWAYSDATA_SSH_HOST }}
        username: ${{ secrets.ALWAYSDATA_SSH_USER }}
        key: ${{ secrets.ALWAYSDATA_SSH_KEY }}
        password: ${{ secrets.ALWAYSDATA_SSH_PASSWORD }}
        passphrase: ${{ secrets.ALWAYSDATA_SSH_PASSPHRASE }}
        port: ${{ secrets.ALWAYSDATA_SSH_PORT || 22 }}
        source: target/calculator-cucumber-0.5.0.jar
        target: ${{ secrets.ALWAYSDATA_DEPLOY_PATH }}
        strip_components: 1
        overwrite: true

    - id: restart
      name: Restart app process on alwaysdata (optional)
      if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/develop' && env.ALWAYSDATA_POST_DEPLOY_CMD != '' }}
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.ALWAYSDATA_SSH_HOST }}
        username: ${{ secrets.ALWAYSDATA_SSH_USER }}
        key: ${{ secrets.ALWAYSDATA_SSH_KEY }}
        password: ${{ secrets.ALWAYSDATA_SSH_PASSWORD }}
        passphrase: ${{ secrets.ALWAYSDATA_SSH_PASSPHRASE }}
        port: ${{ secrets.ALWAYSDATA_SSH_PORT || 22 }}
        script: ${{ env.ALWAYSDATA_POST_DEPLOY_CMD }}
      
    - id: testreport
      name: Publish Test Report
      if: ${{ always() }}
      uses: scacap/action-surefire-report@v1.9.1 
      
    - name: Generate JaCoCo Badge
      id: jacoco
      uses: cicirello/jacoco-badge-generator@v2.12.1
      with:
        generate-coverage-badge: true
        generate-branches-badge: true
        generate-summary: true
        
    - name: Log coverage percentage
      run: |
        echo "coverage = ${{ steps.jacoco.outputs.coverage }}"
        echo "branch coverage = ${{ steps.jacoco.outputs.branches }}"
        
